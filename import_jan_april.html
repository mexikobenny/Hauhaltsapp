window.doLogin = async function() {
  var email = document.getElementById("email").value.trim();
  var pw = document.getElementById("password").value;
  var log = document.getElementById("loginLog");
  log.textContent = "Melde an...";
  try {
    await signInWithEmailAndPassword(auth, email, pw);
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("importCard").style.display = "block";
  } catch(e) {
    log.textContent = "Login fehlgeschlagen: " + e.message;
  }
};

window.startImport = async function() {
  var btn = document.getElementById("importBtn");
  var log = document.getElementById("importLog");
  btn.disabled = true;
  var done = 0;
  for (var i = 0; i < ENTRIES.length; i++) {
    var e = ENTRIES[i];
    var data = {
      name: e.name,
      betrag: e.betrag,
      datum: e.datum,
      kategorie: e.kategorie,
      notiz: e.notiz || "",
      typTags: e.typTags || [],
      typTag: e.typTag || "",
      transportTag: e.transportTag || "",
      reiseTag: e.reiseTag || "",
      erfasst_am: new Date().toISOString()
    };
    try {
      await addDoc(expensesCol, data);
      done++;
      log.textContent = "Importiere... " + done + " / " + ENTRIES.length;
    } catch(err) {
      log.textContent = "Fehler bei Eintrag " + (i+1) + ": " + err.message;
      btn.disabled = false;
      return;
    }
  }
  log.innerHTML = "<span class='ok'>Fertig! " + done + " Eintraege hinzugefuegt. Du kannst diese Seite jetzt schliessen und die App oeffnen.</span>";
};
